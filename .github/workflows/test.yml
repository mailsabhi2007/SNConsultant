name: Test Suite

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    # LLM quality tests run weekly — Monday 6am UTC
    - cron: "0 6 * * 1"

jobs:
  # ── Job 1: Backend API tests (fast, no real LLM) ─────────────────────────────
  api-tests:
    name: API Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt pytest-html

      - name: Create test-reports directory
        run: mkdir -p test-reports

      - name: Run API tests (excluding LLM quality)
        run: |
          pytest tests/integration/test_api_auth.py \
                 tests/integration/test_api_credits.py \
                 tests/integration/test_api_chat.py \
                 tests/integration/test_api_admin.py \
                 --html=test-reports/api-report.html \
                 --self-contained-html \
                 --no-cov \
                 -v
        env:
          # Fake keys so the app initialises without errors
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-test-placeholder' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: test-reports/api-report.html

  # ── Job 2: Playwright E2E tests ───────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: api-tests   # only run if API tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for backend)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js (for frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Seed test user
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, '.')
          import database
          database.init_database()
          from api.services.auth_service import register_user
          from api.services.credit_service import grant_credits
          try:
              uid = register_user("testuser", "Testpass123!", "testuser@example.com")
          except ValueError:
              import database as db
              with db.get_db_connection() as conn:
                  uid = conn.execute("SELECT user_id FROM users WHERE username='testuser'").fetchone()[0]
          grant_credits(uid, 500, "E2E test grant", granted_by="system")
          print(f"Test user ready: {uid}")
          EOF
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-test-placeholder' }}

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend
        env:
          E2E_USERNAME: testuser
          E2E_PASSWORD: Testpass123!
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-test-placeholder' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-reports/playwright/

  # ── Job 3: LLM Quality tests (real API — only on main + schedule) ─────────────
  llm-quality:
    name: LLM Quality Tests
    runs-on: ubuntu-latest
    # Only run on main branch pushes or the weekly schedule
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt pytest-html

      - name: Create test-reports directory
        run: mkdir -p test-reports

      - name: Run LLM quality tests
        run: |
          pytest tests/integration/test_llm_quality.py \
                 -m llm_quality \
                 --html=test-reports/llm-quality-report.html \
                 --self-contained-html \
                 --no-cov \
                 -v \
                 --timeout=120
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload LLM quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-quality-report
          path: test-reports/llm-quality-report.html
